                  required: [inum, idt, val, pos, rchrg, itms]
                  properties:
                    inum: { type: string }
                    idt: { type: string, format: date }
                    val: { type: number }
                    pos: { type: string }
                    rchrg: { type: string, enum: [Y, N] }
                    itms:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        required: [num, itm_det]
                        properties:
                          num: { type: integer }
                          itm_det:
                            type: object
                            additionalProperties: false
                            required: [txval, rt, iamt, camt, samt, csamt]
                            properties:
                              txval: { type: number }
                              rt: { type: number }
                              iamt: { type: number }
                              camt: { type: number }
                              samt: { type: number }
                              csamt: { type: number }
