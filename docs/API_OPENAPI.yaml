          type: array
          items: { type: object }
        cdnr:
          type: array
          items: { type: object }
        hsn:
          type: object
          additionalProperties: false
          required: [data]
          properties:
            data:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [num, hsn_sc, uqc, qty, val, txval, iamt, camt, samt, csamt]
