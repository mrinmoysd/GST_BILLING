openapi: 3.1.0
info:
  title: GST Billing SaaS API
  version: 0.1.0
  description: |
    Strict OpenAPI 3.1 specification for the GST Billing SaaS platform.

    Notes:
    - This spec is derived from `docs/API_SPEC.md`.
    - Multi-tenancy is enforced by `companyId` in path params on most routes.
    - All list endpoints support pagination via `page` and `limit`.

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:4000
    description: Local

tags:
  - name: Auth
  - name: Companies
  - name: Users
  - name: Customers
  - name: Suppliers
  - name: Products
  - name: Inventory
  - name: Invoices
  - name: Purchases
  - name: Payments
  - name: Reports
  - name: GST
  - name: Accounting
  - name: Notifications
  - name: Files
  - name: Billing
  - name: Admin

security:
  - bearerAuth: []

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /api/auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'

  /api/companies:
    post:
      tags: [Companies]
      security: []
      summary: Create company (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'

  /api/companies/{companyId}:
    get:
      tags: [Companies]
      summary: Get company
      parameters:
        - $ref: '#/components/parameters/companyId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Companies]
      summary: Update company
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /api/companies/{companyId}/customers:
    get:
      tags: [Customers]
      summary: List customers
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomerResponse'
    post:
      tags: [Customers]
      summary: Create customer
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422': { $ref: '#/components/responses/Unprocessable' }

  /api/companies/{companyId}/customers/{customerId}:
    get:
      tags: [Customers]
      summary: Get customer
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/customerId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Customers]
      summary: Update customer
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/customerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /api/companies/{companyId}/products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductResponse'
    post:
      tags: [Products]
      summary: Create product
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

  /api/companies/{companyId}/products/{productId}/stock-adjustment:
    post:
      tags: [Inventory]
      summary: Manual stock adjustment
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockAdjustmentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockAdjustmentResponse'

  /api/companies/{companyId}/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInvoiceResponse'
    post:
      tags: [Invoices]
      summary: Create invoice
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '422': { $ref: '#/components/responses/Unprocessable' }

  /api/companies/{companyId}/invoices/{invoiceId}:
    get:
      tags: [Invoices]
      summary: Get invoice
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      tags: [Invoices]
      summary: Update invoice (draft only)
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateInvoiceRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/payments:
    post:
      tags: [Payments]
      summary: Add payment for invoice
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

  /api/companies/{companyId}/gst/gstr1:
    get:
      tags: [GST]
      summary: Generate GSTR-1
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GstReportResponse'

  /api/companies/{companyId}/verify-gstin:
    post:
      tags: [Companies]
      summary: Start GSTIN verification
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/companies/{companyId}/logo:
    post:
      tags: [Companies]
      summary: Upload company logo (multipart)
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /api/companies/{companyId}/invoice-series:
    get:
      tags: [Companies]
      summary: List invoice series
      parameters:
        - $ref: '#/components/parameters/companyId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSeriesListResponse'
    post:
      tags: [Companies]
      summary: Create invoice series
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceSeriesRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSeriesResponse'

  /api/companies/{companyId}/invoice-series/{seriesId}:
    patch:
      tags: [Companies]
      summary: Update invoice series
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/seriesId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceSeriesRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSeriesResponse'

  /api/companies/{companyId}/users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserResponse'
    post:
      tags: [Users]
      summary: Create user
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/companies/{companyId}/roles:
    get:
      tags: [Users]
      summary: List roles
      parameters:
        - $ref: '#/components/parameters/companyId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
    post:
      tags: [Users]
      summary: Create role
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRoleRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleResponse' }

  /api/companies/{companyId}/roles/{roleId}:
    patch:
      tags: [Users]
      summary: Update role
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/roleId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateRoleRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleResponse' }

  /api/companies/{companyId}/permissions:
    get:
      tags: [Users]
      summary: List available permissions
      parameters:
        - $ref: '#/components/parameters/companyId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PermissionListResponse' }

  /api/companies/{companyId}/users/{userId}/role:
    post:
      tags: [Users]
      summary: Assign role to user
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role_id]
              properties:
                role_id: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }

  /api/companies/{companyId}/suppliers:
    get:
      tags: [Suppliers]
      summary: List suppliers
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedSupplierResponse' }
    post:
      tags: [Suppliers]
      summary: Create supplier
      parameters:
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSupplierRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierResponse' }

  /api/companies/{companyId}/suppliers/{supplierId}:
    get:
      tags: [Suppliers]
      summary: Get supplier
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/supplierId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierResponse' }
    patch:
      tags: [Suppliers]
      summary: Update supplier
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/supplierId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSupplierRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierResponse' }
    delete:
      tags: [Suppliers]
      summary: Delete supplier
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/supplierId'
      responses:
        '204':
          description: No Content

  /api/companies/{companyId}/suppliers/{supplierId}/ledger:
    get:
      tags: [Suppliers]
      summary: Supplier ledger
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/supplierId'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LedgerReportResponse' }

  /api/companies/{companyId}/customers/{customerId}/ledger:
    get:
      tags: [Customers]
      summary: Customer ledger
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/customerId'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LedgerReportResponse' }

  /api/companies/{companyId}/products/{productId}:
    patch:
      tags: [Products]
      summary: Update product
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
    delete:
      tags: [Products]
      summary: Delete product
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/productId'
      responses:
        '204':
          description: No Content

  /api/companies/{companyId}/stock-movements:
    get:
      tags: [Inventory]
      summary: List stock movements
      parameters:
        - $ref: '#/components/parameters/companyId'
        - in: query
          name: product_id
          required: false
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedStockMovementResponse' }

  /api/companies/{companyId}/inventory/low-stock:
    get:
      tags: [Inventory]
      summary: List low stock products
      parameters:
        - $ref: '#/components/parameters/companyId'
        - in: query
          name: threshold
          required: false
          schema: { type: number, default: 5 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LowStockResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/send:
    post:
      tags: [Invoices]
      summary: Queue invoice send (email/whatsapp)
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendInvoiceRequest' }
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/issue:
    post:
      tags: [Invoices]
      summary: Issue invoice (draft -> issued)
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/cancel:
    post:
      tags: [Invoices]
      summary: Cancel invoice
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/pdf/regenerate:
    post:
      tags: [Invoices]
      summary: Regenerate invoice PDF
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobEnqueuedResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/pdf:
    get:
      tags: [Invoices]
      summary: Get invoice PDF signed url
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileResponse' }

  /api/companies/{companyId}/invoices/{invoiceId}/credit-notes:
    post:
      tags: [Invoices]
      summary: Create credit note / sales return
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/invoiceId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCreditNoteRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdjustmentResponse' }

  /api/companies/{companyId}/adjustments:
    get:
      tags: [Invoices]
      summary: List adjustments
      parameters:
        - $ref: '#/components/parameters/companyId'
        - in: query
          name: type
          required: true
          schema: { type: string, enum: [credit_note, sales_return] }
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdjustmentListResponse' }

  /api/companies/{companyId}/payments:
    get:
      tags: [Payments]
      summary: List payments
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - in: query
          name: method
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedPaymentResponse' }
    post:
      tags: [Payments]
      summary: Create payment
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateStandalonePaymentRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentResponse' }

  /api/companies/{companyId}/purchases:
    get:
      tags: [Purchases]
      summary: List purchases
      parameters:
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedPurchaseResponse' }
    post:
