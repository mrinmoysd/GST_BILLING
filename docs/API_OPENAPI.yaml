components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    companyId:
      name: companyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    customerId:
      name: customerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    productId:
      name: productId
      in: path
      required: true
      schema: { type: string, format: uuid }
    invoiceId:
      name: invoiceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    seriesId:
      name: seriesId
      in: path
      required: true
      schema: { type: string, format: uuid }
    userId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    roleId:
      name: roleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    supplierId:
      name: supplierId
      in: path
      required: true
      schema: { type: string, format: uuid }
    purchaseId:
      name: purchaseId
      in: path
      required: true
      schema: { type: string, format: uuid }
    templateId:
      name: templateId
      in: path
      required: true
      schema: { type: string, format: uuid }
    fileId:
      name: fileId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ticketId:
      name: ticketId
      in: path
      required: true
      schema: { type: string, format: uuid }
    page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    q:
      name: q
      in: query
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
    idempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 8, maxLength: 128 }
    from:
      name: from
      in: query
      required: true
      schema: { type: string, format: date }
    to:
      name: to
      in: query
      required: true
      schema: { type: string, format: date }
    format:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum: [json, excel]
        default: json

  responses:
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unprocessable:
      description: Unprocessable Entity
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    JobEnqueuedResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [jobId, status]
          properties:
            jobId: { type: string }
            status: { type: string, enum: [queued] }

    QueueMetricsResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
    Envelope:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data: {}
        meta: { $ref: '#/components/schemas/Meta' }

    Meta:
      type: object
      additionalProperties: false
      properties:
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1 }

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string, minLength: 2, maxLength: 80 }
            message: { type: string, minLength: 1, maxLength: 500 }
            details: { type: object }

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6, maxLength: 200 }

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          additionalProperties: false
          properties:
            data:
              type: object
              additionalProperties: false
              required: [access_token, refresh_token, user, company]
              properties:
                access_token: { type: string, minLength: 10 }
                refresh_token: { type: string, minLength: 10 }
                user: { $ref: '#/components/schemas/User' }
                company: { $ref: '#/components/schemas/Company' }

    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties:
        refresh_token: { type: string, minLength: 10 }

    RefreshResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          additionalProperties: false
          properties:
            data:
              type: object
              additionalProperties: false
              required: [access_token]
              properties:
                access_token: { type: string, minLength: 10 }

    Company:
      type: object
      additionalProperties: false
      required: [id, name, business_type]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 200 }
        gstin: { type: [string, 'null'], minLength: 15, maxLength: 15 }
        pan: { type: [string, 'null'], minLength: 10, maxLength: 10 }
        business_type:
          type: string
          enum: [retailer, distributor, service]
        address: { type: [object, 'null'] }
        state: { type: [string, 'null'] }
