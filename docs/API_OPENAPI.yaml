      properties:
        account_code: { type: string, minLength: 1, maxLength: 64 }
        account_name: { type: string, minLength: 1, maxLength: 200 }
        type: { $ref: '#/components/schemas/LedgerType' }

    LedgerType:
      type: string
      description: |
        Canonical Chart-of-Accounts (COA) taxonomy.

        Top-level: asset, liability, equity, income, expense.
        Subtypes are allowed and are rolled up to top-level categories in financial reports.
      enum:
        # Top-level
        - asset
        - liability
        - equity
        - income
        - expense
        # Asset subtypes
        - current_asset
        - fixed_asset
        - inventory
        - accounts_receivable
        - cash
        - bank
        - prepaid_expense
        # Liability subtypes
        - current_liability
        - long_term_liability
        - accounts_payable
        - tax_payable
        - loan
        # Equity subtypes
        - owner_equity
        - retained_earnings
        - capital
        - drawings
        # Income subtypes
        - sales
        - service_income
        - other_income
        - discount_received
        - interest_income
        # Expense subtypes
        - cost_of_goods_sold
        - operating_expense
        - salary
        - rent
        - utilities
        - marketing
        - purchase
        - discount_given
        - tax_expense

